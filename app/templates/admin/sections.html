{% extends "admin/base.html" %}
{% block content %}
<h1>Sections - {{ page.title }}</h1>
<form method="post" class="form inline-form">
  <label>Name<input name="name" required></label>
  <label>Type<input name="section_type" value="content"></label>
  <label>Sort<input name="sort_order" type="number" value="0"></label>
  <label class="checkbox"><input name="is_active" type="checkbox" checked> Active</label>
  <label class="wide">Content<textarea name="content" rows="5"></textarea></label>
  <button class="button" type="submit">Add Section</button>
</form>
<table>
  <tr><th>Name</th><th>Type</th><th>Sort</th><th></th></tr>
  {% for section in page.sections %}
    <tr><td>{{ section.name }}</td><td>{{ section.section_type }}</td><td>{{ section.sort_order }}</td><td><form method="post" action="{{ url_for('main.admin_delete_section', section_id=section.id) }}"><button>Delete</button></form></td></tr>
  {% endfor %}
</table>
{% endblock %}
